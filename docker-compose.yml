version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: analytics_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_db
    ports:
      - "5432:5432"
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data

volumes:
  analytics_pg_data: